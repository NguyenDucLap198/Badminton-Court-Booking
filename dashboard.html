<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Badminton Court Booking</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

</head>

<body>

<header>

<h2>🏸 Badminton Court Booking</h2>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<h3>Calendar đặt sân</h3>

<div id="calendar"></div>

</div>

<div class="container">

<h3>Đặt sân</h3>

<form id="bookingForm">

<input id="name" placeholder="Họ tên" required>

<input id="phone" placeholder="Số điện thoại" required>

<select id="court">

<option>Sân 1</option>
<option>Sân 2</option>
<option>Sân 3</option>

</select>

<input type="date" id="date">

<input type="time" id="start">

<input type="time" id="end">

<button>Đặt sân</button>

</form>

</div>

<div class="container">

<h3>Tìm kiếm</h3>

<input id="search" placeholder="Tìm khách">

<button onclick="exportExcel()">Xuất Excel</button>

</div>

<div class="container">

<h3>Lịch đặt</h3>

<table>

<thead>

<tr>
<th>Khách</th>
<th>Sân</th>
<th>Ngày</th>
<th>Giờ</th>
<th>Trạng thái</th>
<th>Action</th>
</tr>

</thead>

<tbody id="bookingList"></tbody>

</table>

</div>
<div id="qrPopup" class="qr-popup">

<div class="qr-box">

<h3>Thanh toán QR</h3>

<img src="images/qr.jpg" width="200">

<p id="paymentAmount"></p>

<button onclick="confirmPayment()">Đã thanh toán</button>

<button onclick="closeQR()">Đóng</button>

</div>

</div>

<script src="database/db.js"></script>

<script src="js/auth.js"></script>
<script src="js/calendar.js"></script>
<script src="js/booking.js"></script>
<script src="js/payment.js"></script>
<script src="js/search.js"></script>
<script src="js/export.js"></script>

</body>
</html>
